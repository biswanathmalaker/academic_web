{% load static %}<!DOCTYPE html>
<html>
<head>
    <title>{{ title }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <link rel="stylesheet" href="{% static 'literature/css/note_edit.css' %}">
</head>
<body>
    <h1>{{ title }}</h1>

    <form method="POST" id="note-form">
        {% csrf_token %}
        {% if chapter_id %}<input type="hidden" name="chapter_id" value="{{ chapter_id }}">{% endif %}
        {% if section_id %}<input type="hidden" name="section_id" value="{{ section_id }}">{% endif %}
        {% if subsection_id %}<input type="hidden" name="subsection_id" value="{{ subsection_id }}">{% endif %}
        {% if subsubsection_id %}<input type="hidden" name="subsubsection_id" value="{{ subsubsection_id }}">{% endif %}
        <input type="hidden" name="content_json" id="content_json">

        <div class="meta-row">
            <div class="field field-title"><label for="id_title">Title</label>{{ form.title }}</div>
            <div class="field"><label for="id_order">Order</label>{{ form.order }}</div>
        </div>

        <div id="toolbar">
            <button type="button" id="btn-bold">𝐁</button>
            <button type="button" id="btn-italic">𝐼</button>
            <div class="sep"></div>
            <button type="button" id="btn-h1">H1</button>
            <button type="button" id="btn-h2">H2</button>
            <button type="button" id="btn-h3">H3</button>
            <div class="sep"></div>
            <button type="button" id="btn-bullet">• List</button>
            <button type="button" id="btn-ordered">1. List</button>
            <div class="sep"></div>
            <button type="button" id="btn-image">🖼 Image</button>
            <button type="button" id="btn-latex">∑ Math</button>
            <div class="sep"></div>
            <button type="button" id="btn-undo">↩ Undo</button>
            <button type="button" id="btn-redo">↪ Redo</button>
        </div>

        <input type="file" id="image-file-input" accept="image/*" style="display:none">
        <div id="editor-wrapper">
            <div id="editor-loading">Loading editor…</div>
            <div id="editor"></div>
        </div>

        <div class="actions">
            <button type="submit">💾 Save Note</button>
            <a href="{% url 'literature:index' %}">✕ Cancel</a>
        </div>
    </form>

    <div id="latex-modal">
        <div class="modal-box">
            <h3>Insert Math (LaTeX)</h3>
            <textarea id="latex-input" placeholder="e.g.  \frac{a}{b}   or   E = mc^2   or   \int_0^\infty e^{-x}\,dx"></textarea>
            <div class="mode-toggle"><label><input type="checkbox" id="latex-block-mode"> Display as block (centered, own line)</label></div>
            <div id="latex-preview">Preview appears here…</div>
            <div class="modal-actions">
                <button class="btn-insert" id="latex-confirm">Insert</button>
                <button class="btn-cancel" id="latex-cancel">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        window.__NOTE_CONTENT__ = {{ content_json|safe }};
        window.__UPLOAD_URL__   = "{% url 'literature:upload_note_image' %}";
    </script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="{% static 'literature/js/note_edit.js' %}"></script>

    <!-- TipTap Editor with module imports from CDN -->
    <script type="module">
        import { Editor, Node, mergeAttributes } from 'https://esm.sh/@tiptap/core@2.1.13';
        import Document    from 'https://esm.sh/@tiptap/extension-document@2.1.13';
        import Paragraph   from 'https://esm.sh/@tiptap/extension-paragraph@2.1.13';
        import Text        from 'https://esm.sh/@tiptap/extension-text@2.1.13';
        import Bold        from 'https://esm.sh/@tiptap/extension-bold@2.1.13';
        import Italic      from 'https://esm.sh/@tiptap/extension-italic@2.1.13';
        import Heading     from 'https://esm.sh/@tiptap/extension-heading@2.1.13';
        import BulletList  from 'https://esm.sh/@tiptap/extension-bullet-list@2.1.13';
        import OrderedList from 'https://esm.sh/@tiptap/extension-ordered-list@2.1.13';
        import ListItem    from 'https://esm.sh/@tiptap/extension-list-item@2.1.13';
        import History     from 'https://esm.sh/@tiptap/extension-history@2.1.13';
        import HardBreak   from 'https://esm.sh/@tiptap/extension-hard-break@2.1.13';

        // ── Resizable Image Node ───────────────────────────────────────────────
        const ResizableImage = Node.create({
            name: 'resizableImage',
            group: 'block',
            atom: true,
            draggable: true,

            addAttributes() {
                return {
                    src:    { default: null },
                    alt:    { default: '' },
                    width:  { default: 400 },
                    height: { default: null },
                };
            },

            parseHTML() {
                return [{ tag: 'img[src]' }];
            },

            renderHTML({ HTMLAttributes }) {
                const attrs = { ...HTMLAttributes };
                if (attrs.width)  attrs.width  = String(attrs.width);
                if (attrs.height) attrs.height = String(attrs.height);
                return ['img', attrs];
            },

            addNodeView() {
                return ({ node, editor, getPos }) => {
                    // Wrapper
                    const wrap = document.createElement('div');
                    wrap.className = 'img-node-wrap';

                    const img = document.createElement('img');
                    img.src = node.attrs.src || '';
                    img.alt = node.attrs.alt || '';
                    img.style.width  = (node.attrs.width  || 400) + 'px';
                    if (node.attrs.height) img.style.height = node.attrs.height + 'px';

                    // Drag-to-resize handle (bottom-right corner)
                    const handle = document.createElement('div');
                    handle.className = 'img-resize-handle';
                    handle.title = 'Drag to resize';

                    wrap.appendChild(img);
                    wrap.appendChild(handle);

                    // ── Resize logic via mousedown on handle ───────────────────
                    handle.addEventListener('mousedown', (e) => {
                        e.preventDefault();
                        e.stopPropagation();

                        wrap.classList.add('selected');

                        const startX   = e.clientX;
                        const startY   = e.clientY;
                        const startW   = img.offsetWidth;
                        const startH   = img.offsetHeight;
                        const aspect   = startH / startW;

                        const onMove = (mv) => {
                            const dx    = mv.clientX - startX;
                            let newW    = Math.max(60, startW + dx);
                            let newH    = Math.round(newW * aspect);
                            img.style.width  = newW + 'px';
                            img.style.height = newH + 'px';
                        };

                        const onUp = () => {
                            document.removeEventListener('mousemove', onMove);
                            document.removeEventListener('mouseup',   onUp);
                            wrap.classList.remove('selected');

                            // Persist into TipTap node attrs
                            if (typeof getPos === 'function') {
                                editor.chain()
                                    .setNodeSelection(getPos())
                                    .updateAttributes('resizableImage', {
                                        width:  img.offsetWidth,
                                        height: img.offsetHeight,
                                    })
                                    .run();
                            }
                        };

                        document.addEventListener('mousemove', onMove);
                        document.addEventListener('mouseup',   onUp);
                    });

                    return { dom: wrap };
                };
            },
        });

        // ── LaTeX Node ─────────────────────────────────────────────────────────
        const LatexNode = Node.create({
            name: 'latex',
            group: 'inline',
            inline: true,
            atom: true,
            addAttributes() {
                return { latex: { default: '' }, display: { default: false } };
            },
            parseHTML() { return [{ tag: 'span[data-latex]' }]; },
            renderHTML({ HTMLAttributes }) {
                return ['span', mergeAttributes({ 'data-latex': HTMLAttributes.latex, 'data-display': HTMLAttributes.display })];
            },
            addNodeView() {
                return ({ node, editor, getPos }) => {
                    const isBlock = node.attrs.display;
                    const dom = document.createElement(isBlock ? 'div' : 'span');
                    dom.className = isBlock ? 'latex-block-node' : 'latex-inline-node';
                    try { katex.render(node.attrs.latex, dom, { throwOnError: false, displayMode: !!isBlock }); }
                    catch(e) { dom.textContent = node.attrs.latex; }

                    dom.addEventListener('click', () => {
                        // Note: openLatexModal will be called from the static file
                        if (window.openLatexModal) {
                            window.openLatexModal(node.attrs.latex, node.attrs.display, (newLatex, newDisplay) => {
                                const pos = getPos();
                                editor.chain().focus()
                                    .deleteRange({ from: pos, to: pos + node.nodeSize })
                                    .insertContentAt(pos, { type: 'latex', attrs: { latex: newLatex, display: newDisplay } })
                                    .run();
                            });
                        }
                    });
                    return { dom };
                };
            },
        });

        // ── Build editor ───────────────────────────────────────────────────────
        const raw = window.__NOTE_CONTENT__;
        const hasContent = raw && typeof raw === 'object' && Object.keys(raw).length > 0;

        window.__editor = new Editor({
            element: document.getElementById('editor'),
            extensions: [
                Document, Paragraph, Text, HardBreak, History,
                Bold, Italic,
                Heading.configure({ levels: [1,2,3] }),
                BulletList, OrderedList, ListItem,
                ResizableImage,
                LatexNode,
            ],
            content: hasContent ? raw : '<p></p>',
            onUpdate:          () => window.syncToolbar && window.syncToolbar(),
            onSelectionUpdate: () => window.syncToolbar && window.syncToolbar(),
        });

        document.getElementById('editor-loading').style.display = 'none';

        // Make setupToolbarHandlers available if it's defined in static file
        if (window.setupToolbarHandlers) {
            window.setupToolbarHandlers(window.__editor);
        }
    </script>
</body>
</html>
