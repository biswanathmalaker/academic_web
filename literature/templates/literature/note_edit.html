<!DOCTYPE html>
<html>
<head>
    <title>{{ title }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 20px auto;
            padding: 0 20px;
            background: #f9f9f9;
        }
        h1 { color: #333; }

        .meta-row {
            display: flex;
            gap: 20px;
            margin-bottom: 16px;
            align-items: flex-end;
        }
        .meta-row .field { display: flex; flex-direction: column; gap: 4px; }
        .meta-row .field-title { flex: 1; }
        .meta-row label { font-weight: bold; color: #555; font-size: 0.9em; }
        .meta-row input[type=text] {
            padding: 8px 12px;
            font-size: 1.05em;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 100%;
        }
        .meta-row input[type=number] {
            width: 80px;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        /* Toolbar */
        #toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            padding: 8px;
            background: #fff;
            border: 1px solid #ccc;
            border-bottom: none;
            border-radius: 6px 6px 0 0;
        }
        #toolbar button {
            padding: 5px 11px;
            border: 1px solid #ccc;
            background: #f5f5f5;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.88em;
            transition: background 0.15s;
            user-select: none;
        }
        #toolbar button:hover { background: #e0e0e0; }
        #toolbar button.is-active {
            background: #333;
            color: #fff;
            border-color: #333;
        }
        #toolbar .sep {
            width: 1px;
            background: #ccc;
            margin: 2px 4px;
            align-self: stretch;
        }

        /* Editor */
        #editor-wrapper {
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 0 0 6px 6px;
            min-height: 420px;
            padding: 16px;
            cursor: text;
        }
        #editor-wrapper:focus-within {
            border-color: #888;
            box-shadow: 0 0 0 2px rgba(0,102,204,0.1);
        }
        .ProseMirror { outline: none; min-height: 380px; font-size: 1em; line-height: 1.75; }
        .ProseMirror p  { margin: 0.35em 0; }
        .ProseMirror ul { list-style: disc;    padding-left: 1.5em; margin: 0.35em 0; }
        .ProseMirror ol { list-style: decimal; padding-left: 1.5em; margin: 0.35em 0; }
        .ProseMirror li { margin: 0.15em 0; }
        .ProseMirror h1 { font-size: 1.6em;  margin: 0.6em 0 0.25em; }
        .ProseMirror h2 { font-size: 1.35em; margin: 0.55em 0 0.2em; }
        .ProseMirror h3 { font-size: 1.15em; margin: 0.5em 0 0.15em; }
        .ProseMirror img { max-width: 100%; border-radius: 4px; margin: 8px 0; display: block; }

        /* LaTeX nodes in editor */
        .latex-inline-node {
            display: inline-block;
            background: #f0f4ff;
            border: 1px solid #b0c0e8;
            border-radius: 4px;
            padding: 1px 6px;
            margin: 0 2px;
            cursor: pointer;
            vertical-align: middle;
        }
        .latex-block-node {
            display: block;
            background: #f0f4ff;
            border: 1px solid #b0c0e8;
            border-radius: 6px;
            padding: 10px 16px;
            margin: 10px 0;
            text-align: center;
            cursor: pointer;
            overflow-x: auto;
        }

        /* Actions */
        .actions { margin-top: 20px; display: flex; gap: 12px; align-items: center; }
        .actions button[type=submit] {
            padding: 10px 28px;
            background: #0066cc;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
        }
        .actions button[type=submit]:hover { background: #0052a3; }
        .actions a { color: #666; text-decoration: none; }
        .actions a:hover { text-decoration: underline; }

        /* LaTeX modal */
        #latex-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        #latex-modal.open { display: flex; }
        .modal-box {
            background: #fff;
            border-radius: 8px;
            padding: 24px;
            width: 520px;
            max-width: 95vw;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        .modal-box h3 { margin-top: 0; color: #333; }
        .modal-box textarea {
            width: 100%;
            height: 90px;
            font-family: monospace;
            font-size: 1em;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: vertical;
        }
        #latex-preview {
            min-height: 44px;
            background: #f0f4ff;
            border-radius: 4px;
            padding: 10px 14px;
            margin: 10px 0;
            text-align: center;
            font-size: 1.15em;
            overflow-x: auto;
        }
        .modal-actions { display: flex; gap: 10px; margin-top: 12px; }
        .modal-actions button {
            padding: 8px 22px;
            border-radius: 4px;
            border: 1px solid #ccc;
            cursor: pointer;
            font-size: 0.95em;
        }
        .btn-insert { background: #0066cc; color: #fff; border-color: #0066cc !important; }
        .btn-cancel { background: #f5f5f5; }
        .mode-toggle { margin: 8px 0; font-size: 0.9em; color: #555; }
        .mode-toggle label { cursor: pointer; }

        #editor-loading {
            padding: 20px;
            color: #888;
            font-style: italic;
        }
    </style>
</head>
<body>
    <h1>{{ title }}</h1>

    <form method="POST" id="note-form">
        {% csrf_token %}
        {% if chapter_id %}<input type="hidden" name="chapter_id" value="{{ chapter_id }}">{% endif %}
        {% if section_id %}<input type="hidden" name="section_id" value="{{ section_id }}">{% endif %}
        {% if subsection_id %}<input type="hidden" name="subsection_id" value="{{ subsection_id }}">{% endif %}
        {% if subsubsection_id %}<input type="hidden" name="subsubsection_id" value="{{ subsubsection_id }}">{% endif %}
        <input type="hidden" name="content_json" id="content_json">

        <div class="meta-row">
            <div class="field field-title">
                <label for="id_title">Title</label>
                {{ form.title }}
            </div>
            <div class="field">
                <label for="id_order">Order</label>
                {{ form.order }}
            </div>
        </div>

        <div id="toolbar">
            <button type="button" id="btn-bold"    title="Bold (Ctrl+B)">𝐁</button>
            <button type="button" id="btn-italic"  title="Italic (Ctrl+I)">𝐼</button>
            <div class="sep"></div>
            <button type="button" id="btn-h1">H1</button>
            <button type="button" id="btn-h2">H2</button>
            <button type="button" id="btn-h3">H3</button>
            <div class="sep"></div>
            <button type="button" id="btn-bullet"  title="Bullet list">• List</button>
            <button type="button" id="btn-ordered" title="Numbered list">1. List</button>
            <div class="sep"></div>
            <button type="button" id="btn-image"   title="Upload image">🖼 Image</button>
            <button type="button" id="btn-latex"   title="Insert math">∑ Math</button>
            <div class="sep"></div>
            <button type="button" id="btn-undo">↩ Undo</button>
            <button type="button" id="btn-redo">↪ Redo</button>
        </div>

        <input type="file" id="image-file-input" accept="image/*" style="display:none">
        <div id="editor-wrapper">
            <div id="editor-loading">Loading editor…</div>
            <div id="editor"></div>
        </div>

        <div class="actions">
            <button type="submit" id="save-btn">💾 Save Note</button>
            <a href="{% url 'literature:index' %}">✕ Cancel</a>
        </div>
    </form>

    <!-- LaTeX Modal -->
    <div id="latex-modal">
        <div class="modal-box">
            <h3>Insert Math (LaTeX)</h3>
            <textarea id="latex-input" placeholder="e.g.  \frac{a}{b}   or   E = mc^2   or   \int_0^\infty e^{-x}\,dx"></textarea>
            <div class="mode-toggle">
                <label>
                    <input type="checkbox" id="latex-block-mode">
                    Display as block (centered, own line)
                </label>
            </div>
            <div id="latex-preview">Preview appears here…</div>
            <div class="modal-actions">
                <button class="btn-insert" id="latex-confirm">Insert</button>
                <button class="btn-cancel" id="latex-cancel">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Pass Django template data to JS safely before the module runs -->
    <script>
        window.__NOTE_CONTENT__ = {{ content_json|safe }};
        window.__UPLOAD_URL__   = "{% url 'literature:upload_note_image' %}";
        function getCookie(name) {
            let v = null;
            document.cookie.split(';').forEach(c => {
                c = c.trim();
                if (c.startsWith(name + '=')) v = decodeURIComponent(c.slice(name.length + 1));
            });
            return v;
        }
        window.__CSRF__ = getCookie('csrftoken');
    </script>

    <!-- KaTeX (global, used by both module and node views) -->
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

    <!-- TipTap loaded via esm.sh — reliable ES module CDN -->
    <script type="module">
        import { Editor, Node, mergeAttributes } from 'https://esm.sh/@tiptap/core@2.1.13';
        import Document    from 'https://esm.sh/@tiptap/extension-document@2.1.13';
        import Paragraph   from 'https://esm.sh/@tiptap/extension-paragraph@2.1.13';
        import Text        from 'https://esm.sh/@tiptap/extension-text@2.1.13';
        import Bold        from 'https://esm.sh/@tiptap/extension-bold@2.1.13';
        import Italic      from 'https://esm.sh/@tiptap/extension-italic@2.1.13';
        import Heading     from 'https://esm.sh/@tiptap/extension-heading@2.1.13';
        import BulletList  from 'https://esm.sh/@tiptap/extension-bullet-list@2.1.13';
        import OrderedList from 'https://esm.sh/@tiptap/extension-ordered-list@2.1.13';
        import ListItem    from 'https://esm.sh/@tiptap/extension-list-item@2.1.13';
        import Image       from 'https://esm.sh/@tiptap/extension-image@2.1.13';
        import History     from 'https://esm.sh/@tiptap/extension-history@2.1.13';
        import HardBreak   from 'https://esm.sh/@tiptap/extension-hard-break@2.1.13';

        // ── LaTeX custom inline node ──────────────────────────────────────────
        const LatexNode = Node.create({
            name: 'latex',
            group: 'inline',
            inline: true,
            atom: true,

            addAttributes() {
                return {
                    latex:   { default: '' },
                    display: { default: false },
                };
            },

            parseHTML() {
                return [{ tag: 'span[data-latex]' }];
            },

            renderHTML({ HTMLAttributes }) {
                return ['span', mergeAttributes({
                    'data-latex':   HTMLAttributes.latex,
                    'data-display': HTMLAttributes.display,
                })];
            },

            addNodeView() {
                return ({ node, editor, getPos }) => {
                    const isBlock = node.attrs.display;
                    const dom = document.createElement(isBlock ? 'div' : 'span');
                    dom.className = isBlock ? 'latex-block-node' : 'latex-inline-node';

                    try {
                        katex.render(node.attrs.latex, dom, {
                            throwOnError: false,
                            displayMode: !!isBlock,
                        });
                    } catch(e) {
                        dom.textContent = node.attrs.latex;
                    }

                    // Click to edit existing node
                    dom.addEventListener('click', () => {
                        openLatexModal(node.attrs.latex, node.attrs.display, (newLatex, newDisplay) => {
                            const pos = getPos();
                            editor.chain().focus()
                                .deleteRange({ from: pos, to: pos + node.nodeSize })
                                .insertContentAt(pos, {
                                    type: 'latex',
                                    attrs: { latex: newLatex, display: newDisplay }
                                })
                                .run();
                        });
                    });

                    return { dom };
                };
            },
        });

        // ── Initialise editor ─────────────────────────────────────────────────
        const initialContent = window.__NOTE_CONTENT__;
        const hasContent = initialContent && typeof initialContent === 'object' && Object.keys(initialContent).length > 0;

        const editor = new Editor({
            element: document.getElementById('editor'),
            extensions: [
                Document, Paragraph, Text, HardBreak, History,
                Bold, Italic,
                Heading.configure({ levels: [1, 2, 3] }),
                BulletList, OrderedList, ListItem,
                Image.configure({ inline: false, allowBase64: false }),
                LatexNode,
            ],
            content: hasContent ? initialContent : '<p></p>',
            onUpdate:          () => syncToolbar(),
            onSelectionUpdate: () => syncToolbar(),
        });

        document.getElementById('editor-loading').style.display = 'none';

        // ── Toolbar active-state sync ─────────────────────────────────────────
        function syncToolbar() {
            document.getElementById('btn-bold').classList.toggle('is-active',
                editor.isActive('bold'));
            document.getElementById('btn-italic').classList.toggle('is-active',
                editor.isActive('italic'));
            document.getElementById('btn-h1').classList.toggle('is-active',
                editor.isActive('heading', { level: 1 }));
            document.getElementById('btn-h2').classList.toggle('is-active',
                editor.isActive('heading', { level: 2 }));
            document.getElementById('btn-h3').classList.toggle('is-active',
                editor.isActive('heading', { level: 3 }));
            document.getElementById('btn-bullet').classList.toggle('is-active',
                editor.isActive('bulletList'));
            document.getElementById('btn-ordered').classList.toggle('is-active',
                editor.isActive('orderedList'));
        }

        // ── Toolbar click handlers ────────────────────────────────────────────
        document.getElementById('btn-bold').addEventListener('click',
            () => editor.chain().focus().toggleBold().run());
        document.getElementById('btn-italic').addEventListener('click',
            () => editor.chain().focus().toggleItalic().run());
        document.getElementById('btn-h1').addEventListener('click',
            () => editor.chain().focus().toggleHeading({ level: 1 }).run());
        document.getElementById('btn-h2').addEventListener('click',
            () => editor.chain().focus().toggleHeading({ level: 2 }).run());
        document.getElementById('btn-h3').addEventListener('click',
            () => editor.chain().focus().toggleHeading({ level: 3 }).run());
        document.getElementById('btn-bullet').addEventListener('click',
            () => editor.chain().focus().toggleBulletList().run());
        document.getElementById('btn-ordered').addEventListener('click',
            () => editor.chain().focus().toggleOrderedList().run());
        document.getElementById('btn-undo').addEventListener('click',
            () => editor.chain().focus().undo().run());
        document.getElementById('btn-redo').addEventListener('click',
            () => editor.chain().focus().redo().run());

        // ── Image upload ──────────────────────────────────────────────────────
        document.getElementById('btn-image').addEventListener('click',
            () => document.getElementById('image-file-input').click());

        document.getElementById('image-file-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const fd = new FormData();
            fd.append('image', file);
            try {
                const res  = await fetch(window.__UPLOAD_URL__, {
                    method: 'POST',
                    headers: { 'X-CSRFToken': window.__CSRF__ },
                    body: fd,
                });
                const data = await res.json();
                if (data.url) {
                    editor.chain().focus().setImage({ src: data.url }).run();
                } else {
                    alert('Upload failed: ' + (data.error || 'unknown'));
                }
            } catch (err) {
                alert('Upload error: ' + err);
            }
            e.target.value = '';
        });

        // ── LaTeX modal ───────────────────────────────────────────────────────
        let _latexCallback = null;

        function openLatexModal(existing = '', existingDisplay = false, cb = null) {
            _latexCallback = cb;
            document.getElementById('latex-input').value        = existing;
            document.getElementById('latex-block-mode').checked = existingDisplay;
            previewLatex();
            document.getElementById('latex-modal').classList.add('open');
            setTimeout(() => document.getElementById('latex-input').focus(), 60);
        }

        function previewLatex() {
            const latex   = document.getElementById('latex-input').value.trim();
            const display = document.getElementById('latex-block-mode').checked;
            const el      = document.getElementById('latex-preview');
            if (!latex) { el.textContent = 'Preview appears here…'; return; }
            try {
                katex.render(latex, el, { throwOnError: false, displayMode: display });
            } catch(e) {
                el.textContent = 'Invalid LaTeX';
            }
        }

        document.getElementById('latex-input').addEventListener('input', previewLatex);
        document.getElementById('latex-block-mode').addEventListener('change', previewLatex);

        document.getElementById('btn-latex').addEventListener('click',
            () => openLatexModal('', false, null));

        document.getElementById('latex-confirm').addEventListener('click', () => {
            const latex   = document.getElementById('latex-input').value.trim();
            const display = document.getElementById('latex-block-mode').checked;
            if (!latex) return;
            if (_latexCallback) {
                _latexCallback(latex, display);
            } else {
                editor.chain().focus().insertContent({
                    type: 'latex', attrs: { latex, display }
                }).run();
            }
            document.getElementById('latex-modal').classList.remove('open');
            _latexCallback = null;
        });

        document.getElementById('latex-cancel').addEventListener('click', () => {
            document.getElementById('latex-modal').classList.remove('open');
            _latexCallback = null;
        });

        // Close on backdrop click
        document.getElementById('latex-modal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('latex-modal')) {
                document.getElementById('latex-modal').classList.remove('open');
                _latexCallback = null;
            }
        });

        // ── Serialize to JSON on submit ───────────────────────────────────────
        document.getElementById('note-form').addEventListener('submit', () => {
            document.getElementById('content_json').value = JSON.stringify(editor.getJSON());
        });

    </script>
</body>
</html>
